name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: ESLint
        run: npm run lint
      - name: TypeScript type check
        run: npx tsc --noEmit
      - name: Auto-format with Prettier
        run: npx prettier --write "src/**/*.{ts,tsx,css}"
      - name: Check if formatting changed files
        run: |
          if [ -n "$(git diff --name-only)" ]; then
            echo "ERROR: Files not formatted. Run 'npx prettier --write \"src/**/*.{ts,tsx,css}\"' before committing."
            git diff --name-only
            exit 1
          fi

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks - scan for secrets in code
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: npm audit - check for vulnerable packages
        run: npm audit --audit-level=high || true

      - name: Trivy - scan for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run tests with coverage
        run: npm run test -- --coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
        if: always()

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build production
        run: npm run build
      - name: Check bundle size
        run: |
          BUILD_SIZE=$(du -sk dist/ | cut -f1)
          echo "Bundle size: ${BUILD_SIZE}KB"
          if [ "$BUILD_SIZE" -gt 10240 ]; then
            echo "WARNING: Bundle exceeds 10MB"
          fi
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
